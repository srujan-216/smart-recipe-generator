version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: smart-recipe-mongodb
    environment:
      MONGO_INITDB_DATABASE: smart_recipe_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/smart_recipe_db --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: smart-recipe-app
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongodb:27017/smart_recipe_db
      JWT_SECRET: dev-secret-key-change-in-production
      GROQ_API_KEY: ${GROQ_API_KEY}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      CLIENT_URL: http://localhost:5000
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    restart: unless-stopped
    command: npm run dev

volumes:
  mongodb_data:
    driver: local
